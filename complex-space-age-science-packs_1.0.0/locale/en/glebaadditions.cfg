[mod-setting-name]
ga-biolabs-require-nutrients=Biolabs require nutrients
ga-biolabs-energy-consumption=Biolab nutrient consumption
ga-metallurgic-weight=Metallurgic pack weight (kg)
ga-metallurgic-platform-drag-weight=Metallurgic pack platform drag weight (kg)

[mod-setting-description]
ga-biolabs-require-nutrients=Enables or disables biolabs consuming nutrients instead of power.
ga-biolabs-energy-consumption=The amount of nutrients in kW that biolabs use. 1000 kW = 0.5 common nutrients per second. Has no effect if "biolabs require nutrients" is off.
ga-metallurgic-weight=Weight of one metallurgic science pack in kilograms for rocket logistics. Default 5 kg: at stack size 10, 200 packs = 1 ton = exactly one rocket load. Does NOT affect platform drag.
ga-metallurgic-platform-drag-weight=Virtual weight in kilograms added to platform drag per metallurgic science pack stored in the hub. Requires Rocs-Improved-Platform-Drag mod. Does NOT affect rocket capacity. Default 500 kg: 5000 packs = 2500 tons of virtual drag mass.